version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries"
    schema: "migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
            nullable: false
          - db_type: "pg_catalog.timestamptz"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
            nullable: true
          - db_type: "pg_catalog.date"
            go_type: "time.Time"
            nullable: false
          - db_type: "pg_catalog.date"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
            nullable: true
